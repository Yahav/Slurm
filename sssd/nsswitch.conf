# Name Service Switch — route user/group lookups through SSSD (then files).
# This is what makes `id alice` / getpwnam() resolve LDAP users on every node.
passwd:         files sss
group:          files sss
shadow:         files sss
gshadow:        files

hosts:          files dns
networks:       files

protocols:      db files
services:       db files
ethers:         db files
rpc:            db files

netgroup:       nis sss
