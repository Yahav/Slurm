# SSSD — resolves LDAP users on each node WITHOUT joining a domain.
#
# id_provider/auth_provider = ldap (NOT "ad"): this is the "authenticate
# against AD's LDAP but don't join the realm" mode you asked for. Against a
# real AD you'd keep id_provider=ldap and just point ldap_uri at the DCs and
# adjust ldap_schema (AD uses rfc2307bis + the AD attribute names, often with
# ID mapping). The structure is identical.
[sssd]
config_file_version = 2
services = nss, pam
domains = LDAP

[nss]
# Don't try to resolve the local/system accounts via LDAP.
filter_users = root,slurm,munge
filter_groups = root,slurm,munge

[domain/LDAP]
id_provider = ldap
auth_provider = ldap
ldap_uri = ldap://openldap
ldap_search_base = dc=cluster,dc=local

# Service account used to read the directory (read-only bind).
ldap_default_bind_dn = cn=admin,dc=cluster,dc=local
ldap_default_authtok = adminpassword

ldap_schema = rfc2307
ldap_user_home_directory = homeDirectory

# We talk plain ldap:// in the lab. SSSD refuses password auth over a non-TLS
# connection unless you explicitly opt out — which we do, FOR THE LAB ONLY.
# Against real AD you would use ldaps:// or StartTLS and remove this line.
ldap_auth_disable_tls_never_use_in_production = true
ldap_tls_reqcert = never

# enumerate=true lets `getent passwd` list all LDAP users — handy for testing
# and for pre-creating home dirs. Disable on large/real directories.
enumerate = true
cache_credentials = true
