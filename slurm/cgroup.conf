# cgroup.conf
# Docker Desktop hosts use cgroup v2, and slurmd auto-detects and requires a
# cgroup plugin even when ProctrackType=proctrack/linuxproc. We disable cgroup
# support entirely so the lab runs in unprivileged containers.
#
# To experiment with real cgroup-based resource enforcement instead:
#   1. set CgroupPlugin=autodetect (or cgroup/v2) here
#   2. set ProctrackType=proctrack/cgroup and TaskPlugin=task/cgroup in slurm.conf
#   3. rebuild the image with libdbus-1-dev installed (so cgroup/v2 is compiled)
#   4. mark the c1/c2 services `privileged: true` in docker-compose.yml
CgroupPlugin=disabled
