# slurmdbd.conf — accounting daemon config.
# Must be mode 0600 owned by the slurm user (the entrypoint enforces this).
AuthType=auth/munge
DbdHost=slurmdbd
DbdPort=6819

SlurmUser=slurm

StorageType=accounting_storage/mysql
StorageHost=mysql
StoragePort=3306
StorageUser=slurm
StoragePass=slurmpass
StorageLoc=slurm_acct_db

LogFile=/var/log/slurm/slurmdbd.log
PidFile=/run/slurm/slurmdbd.pid
