# gres.conf — fake GPUs.
# Slurm's gpu plugin ignores file-less GPU GRES, so we point File= at dummy
# device nodes that the entrypoint creates (/dev/fakegpu0, /dev/fakegpu1).
# The [0-1] range yields Count=2. Jobs can request --gres=gpu:N and Slurm
# schedules/accounts for them and sets CUDA_VISIBLE_DEVICES to the allocated
# indices — but the devices are fake, so it's for scheduling experiments only.
NodeName=c1 Name=gpu File=/dev/fakegpu[0-1]
NodeName=c2 Name=gpu File=/dev/fakegpu[0-1]
