# slurm.conf — lab cluster
# Mounted read-only into /etc/slurm on the controller, login, and compute
# containers. Edit this file then `docker compose exec slurmctld scontrol reconfigure`.

ClusterName=lab
SlurmctldHost=slurmctld

# --- Auth & users ------------------------------------------------------------
AuthType=auth/munge
SlurmUser=slurm
SlurmdUser=root

# --- Ports -------------------------------------------------------------------
SlurmctldPort=6817
SlurmdPort=6818

# --- Process tracking --------------------------------------------------------
# linuxproc + task/none avoids needing privileged containers / cgroup mounts.
# To experiment with cgroups: switch these to proctrack/cgroup + task/cgroup,
# add a cgroup.conf, and run the compute containers as privileged.
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none

# --- Scheduling --------------------------------------------------------------
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory

# --- Generic resources (fake GPUs) ------------------------------------------
GresTypes=gpu

# --- State & spool -----------------------------------------------------------
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SwitchType=switch/none
MpiDefault=none
ReturnToService=2

# --- Timers ------------------------------------------------------------------
SlurmctldTimeout=30
SlurmdTimeout=30
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0

# --- Logging / pid -----------------------------------------------------------
SlurmctldPidFile=/run/slurm/slurmctld.pid
SlurmdPidFile=/run/slurm/slurmd.pid
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# --- Accounting --------------------------------------------------------------
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=slurmdbd
AccountingStoragePort=6819
JobAcctGatherType=jobacct_gather/linux
JobAcctGatherFrequency=30

# --- Nodes -------------------------------------------------------------------
# Declared resources are virtual: Slurm schedules against these numbers, the
# containers don't actually need 2 real GPUs or 1000MB free.
NodeName=c1 NodeAddr=c1 CPUs=2 RealMemory=1000 Gres=gpu:2 State=UNKNOWN
NodeName=c2 NodeAddr=c2 CPUs=2 RealMemory=1000 Gres=gpu:2 State=UNKNOWN

# --- Partitions --------------------------------------------------------------
PartitionName=normal Nodes=c1,c2 Default=YES MaxTime=INFINITE State=UP
PartitionName=gpu    Nodes=c1,c2 MaxTime=INFINITE State=UP
