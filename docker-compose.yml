# Slurm lab cluster — fully simulated, no real hardware needed.
#
#   slurmctld  : controller / scheduler
#   slurmdbd   : accounting daemon
#   mysql      : accounting database (MariaDB)
#   login      : submit host — exec into this to run sbatch/srun/sinfo
#   c1, c2     : compute nodes (slurmd) with fake GPU GRES
#
# All Slurm containers share one image (built once) and the same config +
# munge key. /home is a shared volume so the lab user's files are visible
# cluster-wide, like a real shared filesystem.

x-slurm-image: &slurm-image
  image: slurm-lab:local
  build:
    context: .
    args:
      SLURM_VERSION: "24.11.5"

x-slurm-common: &slurm-common
  <<: *slurm-image
  volumes:
    # Staged read-only; the entrypoint copies these into an image-local
    # /etc/slurm so it can set the perms/ownership Slurm requires.
    - ./slurm:/etc/slurm-host:ro
    - home:/home
  networks:
    - slurm

services:
  # --- Directory (the "Active Directory" stand-in) ---------------------------
  openldap:
    image: osixia/openldap:1.5.0
    hostname: openldap
    command: ["--copy-service", "--loglevel", "info"]
    environment:
      LDAP_ORGANISATION: "Cluster Lab"
      LDAP_DOMAIN: "cluster.local"          # → base dn dc=cluster,dc=local
      LDAP_ADMIN_PASSWORD: "adminpassword"
    volumes:
      # Seed users/groups on first init.
      - ./ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/bootstrap.ldif:ro
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    networks:
      - slurm

  # Web UI to browse/edit the directory (http://localhost:8443, login:
  # cn=admin,dc=cluster,dc=local / adminpassword).
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    hostname: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8443:80"
    depends_on:
      - openldap
    networks:
      - slurm

  mysql:
    image: mariadb:11
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: slurm_acct_db
      MYSQL_USER: slurm
      MYSQL_PASSWORD: slurmpass
    # Settings SchedMD recommends for the accounting DB.
    command:
      - --innodb_buffer_pool_size=256M
      - --innodb_lock_wait_timeout=900
      - --innodb_log_file_size=64M
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - slurm
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 5s
      timeout: 3s
      retries: 20

  slurmdbd:
    <<: *slurm-common
    hostname: slurmdbd
    command: ["slurmdbd"]
    depends_on:
      mysql:
        condition: service_healthy
      openldap:
        condition: service_started

  slurmctld:
    <<: *slurm-common
    hostname: slurmctld
    command: ["slurmctld"]
    depends_on:
      - slurmdbd
      - openldap
    # /shared holds ColdFront's slurm_dump output that we load with sacctmgr.
    volumes:
      - ./slurm:/etc/slurm-host:ro
      - home:/home
      - coldfront_sync:/shared

  # slurmd forks a helper via clone() to read each user's env on job launch.
  # Docker's default seccomp profile blocks some of the CLONE_* flags it uses,
  # which makes slurmd FATAL with "clone: Operation not permitted" the first
  # time a batch job runs. Disable seccomp on just the compute nodes.
  c1:
    <<: *slurm-common
    hostname: c1
    command: ["slurmd"]
    security_opt:
      - seccomp:unconfined
    depends_on:
      - slurmctld
      - openldap

  c2:
    <<: *slurm-common
    hostname: c2
    command: ["slurmd"]
    security_opt:
      - seccomp:unconfined
    depends_on:
      - slurmctld
      - openldap

  c3:
    <<: *slurm-common
    hostname: c3
    command: ["slurmd"]
    security_opt:
      - seccomp:unconfined
    depends_on:
      - slurmctld
      - openldap

  login:
    <<: *slurm-common
    hostname: login
    command: ["login"]
    depends_on:
      - slurmctld
      - openldap
    # Shared with coldfront so `slurm_dump` output is loadable by sacctmgr here.
    volumes:
      - ./slurm:/etc/slurm-host:ro
      - home:/home
      - coldfront_sync:/shared

  # --- ColdFront management portal -------------------------------------------
  coldfront-db:
    image: postgres:16
    hostname: coldfront-db
    environment:
      POSTGRES_DB: coldfront
      POSTGRES_USER: coldfront
      POSTGRES_PASSWORD: coldfront
    volumes:
      - coldfront_db:/var/lib/postgresql/data
    networks:
      - slurm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldfront"]
      interval: 5s
      timeout: 3s
      retries: 20

  coldfront:
    build:
      context: ./coldfront
    image: coldfront-lab:local
    hostname: coldfront
    environment:
      # Enable the Slurm export plugin and the LDAP user-search plugin.
      PLUGIN_SLURM: "True"
      SLURM_SACCTMGR_PATH: "/usr/bin/sacctmgr"
      PLUGIN_LDAP_USER_SEARCH: "True"
      LDAP_USER_SEARCH_SERVER_URI: "ldap://openldap"
      LDAP_USER_SEARCH_BASE: "ou=people,dc=cluster,dc=local"
      LDAP_USER_SEARCH_BIND_DN: "cn=admin,dc=cluster,dc=local"
      LDAP_USER_SEARCH_BIND_PASSWORD: "adminpassword"
      # Plain ldap:// (port 389) — do NOT use SSL/TLS (default is SSL=True).
      LDAP_USER_SEARCH_USE_SSL: "False"
      LDAP_USER_SEARCH_USE_TLS: "False"
    ports:
      - "8000:8000"
    volumes:
      - coldfront_sync:/shared
    depends_on:
      coldfront-db:
        condition: service_healthy
      openldap:
        condition: service_started
    networks:
      - slurm

  # --- Open OnDemand portal --------------------------------------------------
  ondemand:
    build:
      context: ./ondemand
    image: ood-lab:local
    hostname: ondemand
    ports:
      - "8050:8050"
    volumes:
      - ./ondemand/config/ood_portal.yml:/etc/ood/config/ood_portal.yml:ro
      - ./ondemand/config/clusters.d:/etc/ood/config/clusters.d:ro
      - ./ondemand/apps/jupyter:/var/www/ood/apps/sys/jupyter:ro  # interactive app
      - ./slurm:/etc/slurm-host:ro      # slurm.conf for the job adapter
      - home:/home                       # shared homes (Files app, job output)
    depends_on:
      - openldap
      - slurmctld
    networks:
      - slurm

volumes:
  home:
  mysql:
  ldap_data:
  ldap_config:
  coldfront_db:
  coldfront_sync:

networks:
  slurm:
    driver: bridge
