# Slurm lab cluster — fully simulated, no real hardware needed.
#
#   slurmctld  : controller / scheduler
#   slurmdbd   : accounting daemon
#   mysql      : accounting database (MariaDB)
#   login      : submit host — exec into this to run sbatch/srun/sinfo
#   c1, c2     : compute nodes (slurmd) with fake GPU GRES
#
# All Slurm containers share one image (built once) and the same config +
# munge key. /home is a shared volume so the lab user's files are visible
# cluster-wide, like a real shared filesystem.

x-slurm-image: &slurm-image
  image: slurm-lab:local
  build:
    context: .
    args:
      SLURM_VERSION: "24.11.5"

x-slurm-common: &slurm-common
  <<: *slurm-image
  volumes:
    # Staged read-only; the entrypoint copies these into an image-local
    # /etc/slurm so it can set the perms/ownership Slurm requires.
    - ./slurm:/etc/slurm-host:ro
    - home:/home
  networks:
    - slurm

services:
  mysql:
    image: mariadb:11
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: slurm_acct_db
      MYSQL_USER: slurm
      MYSQL_PASSWORD: slurmpass
    # Settings SchedMD recommends for the accounting DB.
    command:
      - --innodb_buffer_pool_size=256M
      - --innodb_lock_wait_timeout=900
      - --innodb_log_file_size=64M
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - slurm
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 5s
      timeout: 3s
      retries: 20

  slurmdbd:
    <<: *slurm-common
    hostname: slurmdbd
    command: ["slurmdbd"]
    depends_on:
      mysql:
        condition: service_healthy

  slurmctld:
    <<: *slurm-common
    hostname: slurmctld
    command: ["slurmctld"]
    depends_on:
      - slurmdbd

  c1:
    <<: *slurm-common
    hostname: c1
    command: ["slurmd"]
    depends_on:
      - slurmctld

  c2:
    <<: *slurm-common
    hostname: c2
    command: ["slurmd"]
    depends_on:
      - slurmctld

  login:
    <<: *slurm-common
    hostname: login
    command: ["login"]
    depends_on:
      - slurmctld

volumes:
  home:
  mysql:

networks:
  slurm:
    driver: bridge
